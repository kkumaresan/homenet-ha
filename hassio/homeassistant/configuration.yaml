# =============================================================
# Home Assistant - Main Configuration
# Environment-specific values are in secrets.yaml (generated by setup.sh)
# Integration packages are loaded from integrations/ directory
# =============================================================

homeassistant:
  name: !secret ha_name
  latitude: !secret ha_latitude
  longitude: !secret ha_longitude
  elevation: !secret ha_elevation
  unit_system: !secret ha_unit_system
  time_zone: !secret ha_timezone
  packages: !include_dir_named integrations

# Enables default HA integrations (frontend, api, history, etc.)
default_config:

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - 172.17.0.0/16   # Docker bridge gateway (NPM -> published port 8123)
    - 10.1.0.6        # Pi LAN IP (NPM runs in host network mode)

# --- Text to Speech ---
tts:
  - platform: google_translate

# --- MQTT integration (broker configured here via secrets.yaml) ---
mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  protocol: 5
  discovery: true
  discovery_prefix: homeassistant

# --- Includes ---
script: !include scripts.yaml
python_script:

# --- Logging ---
logger:
  default: warning
  logs:
    homeassistant.components.python_script: debug
    homeassistant.components.alexa: debug
    custom_components: debug
