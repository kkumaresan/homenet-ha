# Heater indicator LEDs — turn ON when heater timer triggers (TOSET state)
# Publishes MQTT payload "0" to activate the indicator relay

  - alias: dadheater indicator ON
    initial_state: true
    trigger:
    - platform: state
      entity_id: sensor.utility_dadheater_s11_ts2
      to: "TOSET"
    action:
    - delay:
        seconds: 1
    - service: mqtt.publish
      data:
        topic: "sai-nivas/utility/heaterindicator/cmnd/power1"
        payload: "0"
        retain: true

