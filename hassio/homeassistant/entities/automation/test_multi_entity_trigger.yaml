- id: '1721409884352'
  alias: Test Sai unavailable
  description: Alert when study fan Sonoff becomes unavailable
  trigger:
  - platform: state
    entity_id: switch.study_fan_sonoff
  condition: []
  action:
  - wait_template: "{{is_state('switch.study_fan_sonoff', 'unavailable')}}"
    continue_on_timeout: true
  - service: persistent_notification.create
    metadata: {}
    data:
      message: Sai Test unavailable
