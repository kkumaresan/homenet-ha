# Power monitoring test automations (disabled by default)
# Monitors RYB phase current thresholds for home power supply

- alias: RYB 3 amps
  description: Alert when all three phases exceed 2A
  initial_state: false
  trigger:
  - platform: state
    entity_id: sensor.utility_powerhome_s11_value 
  - platform: state
    entity_id: sensor.utility_powerhome_s12_value 
  - platform: state
    entity_id: sensor.utility_powerhome_s13_value 
  condition:
  - condition: template
    value_template: >
      {% set rvalue = states('sensor.utility_powerhome_s11_value') %}
      {% set yvalue = states('sensor.utility_powerhome_s12_value') %}
      {% set bvalue = states('sensor.utility_powerhome_s13_value') %}
      {% if rvalue | float > 2.00 and
           bvalue | float > 2.00 and
           yvalue | float > 2.00 %}
           true 
        {% else %}  
           false 
        {% endif %}
  action:
  - delay:
      seconds: 1
  - service: persistent_notification.create
    data_template:
       message: RYB 3
  id: e7f02d5ddc0c41c4bd29ac838af9281a

