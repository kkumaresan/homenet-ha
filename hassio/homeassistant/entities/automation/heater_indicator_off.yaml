# Heater indicator LEDs — turn OFF when heater goes to OFF state
# Publishes MQTT payload "1" to deactivate the indicator relay

  - alias: dadheater indicator OFF
    initial_state: true
    trigger:
    - platform: state
      entity_id: sensor.utility_dadheater_s11_ts2
      to: "OFF"
    action:
    - delay:
        seconds: 1
    - service: mqtt.publish
      data:
        topic: "sai-nivas/utility/heaterindicator/cmnd/power1"
        payload: "1"
        retain: true

