# Utility Study Heater — Wemos controller + relay

  # Wemos controller
  - name: "utility studyheater Wemos Control"
    command_topic: "sai-nivas/utility/studyheater/control"
    state_topic: "sai-nivas/utility/studyheater/control/status"
    availability_topic: "sai-nivas/utility/studyheater/LWT"
    payload_on: "1"
    payload_off: "0"
    state_on: "1"
    state_off: "0"
    payload_available: "1"
    payload_not_available: "0"
    qos: 0
    retain: true
  # Automation toggle
  - name: "utility studyheater automation control"
    command_topic: "sai-nivas/utility/studyheater/automation"
    state_topic: "sai-nivas/utility/studyheater/automation"
    payload_on: "1"
    payload_off: "0"
    state_on: "1"
    state_off: "0"
    qos: 0
    retain: true
  # Heater relay
  - name: "utility studyheater one"
    command_topic: "sai-nivas/utility/studyheater/a11/a"
    state_topic: "sai-nivas/utility/studyheater/a11/s"
    availability_topic: "sai-nivas/utility/studyheater/LWT"
    payload_on: "1"
    payload_off: "0"
    state_on: "1"
    state_off: "0"
    payload_available: "1"
    payload_not_available: "0"
    qos: 0
    retain: true
