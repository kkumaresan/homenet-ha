# Balcony Light — Wemos + Sonoff ESP01

  # Wemos controller
  - name: "balcony light Wemos Control"
    command_topic: "kk/balcony/light/control"
    state_topic: "kk/balcony/light/control/status"
    availability_topic: "kk/balcony/light/LWT"
    payload_on: "1"
    payload_off: "0"
    state_on: "1"
    state_off: "0"
    payload_available: "1"
    payload_not_available: "0"
    qos: 0
    retain: true

  # Automation toggle
  - name: "balcony light automation control"
    command_topic: "kk/balcony/light/automation"
    state_topic: "kk/balcony/light/automation"
    payload_on: "1"
    payload_off: "0"
    state_on: "1"
    state_off: "0"
    qos: 0
    retain: true

  # Sonoff ESP01 relay (NO mode — inverted payloads)
  - name: "balcony light one"
    command_topic: "kk/balcony/light/a11/a/cmnd/power"
    state_topic: "kk/balcony/light/a11/a/stat/POWER"
    availability_topic: "kk/balcony/light/a11/a/tele/LWT"
    payload_on: "OFF"
    payload_off: "ON"
    state_on: "OFF"
    state_off: "ON"
    payload_available: "Online"
    payload_not_available: "Offline"
    qos: 0
    retain: false
